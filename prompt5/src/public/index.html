<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL 단축 서비스</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- 헤더 -->
    <header>
      <div class="logo">🔗 Short.ly</div>
      <p class="tagline">긴 URL을 짧고 간편하게 만드세요</p>
    </header>

    <!-- 단축 폼 -->
    <section class="card shorten-card">
      <h2>URL 단축하기</h2>
      <form id="shortenForm">
        <div class="field">
          <label for="url">원본 URL <span class="required">*</span></label>
          <input type="url" id="url" placeholder="https://example.com/very/long/url" required />
        </div>
        <div class="row">
          <div class="field">
            <label for="customCode">커스텀 코드 <span class="optional">(선택)</span></label>
            <input type="text" id="customCode" placeholder="my-link" maxlength="30" />
          </div>
          <div class="field">
            <label for="expiresDays">만료 기간 <span class="optional">(선택)</span></label>
            <select id="expiresDays">
              <option value="">만료 없음</option>
              <option value="1">1일</option>
              <option value="7">7일</option>
              <option value="30">30일</option>
              <option value="90">90일</option>
            </select>
          </div>
        </div>
        <button type="submit" id="submitBtn">단축하기</button>
      </form>

      <!-- 결과 -->
      <div id="result" class="result hidden">
        <div class="result-label">단축 URL 생성 완료!</div>
        <div class="short-url-box">
          <a id="shortUrlLink" href="#" target="_blank"></a>
          <button id="copyBtn" title="복사">📋 복사</button>
        </div>
        <div id="resultMeta" class="result-meta"></div>
      </div>

      <div id="formError" class="error-msg hidden"></div>
    </section>

    <!-- 탭 -->
    <div class="tabs">
      <button class="tab active" data-tab="list">📋 URL 목록</button>
      <button class="tab" data-tab="stats">📊 통계 조회</button>
    </div>

    <!-- URL 목록 -->
    <section id="listTab" class="card tab-content">
      <div class="list-header">
        <h2>단축 URL 목록</h2>
        <button id="refreshBtn">새로고침</button>
      </div>
      <div id="urlList" class="url-list">
        <div class="empty-state">로딩 중...</div>
      </div>
    </section>

    <!-- 통계 조회 -->
    <section id="statsTab" class="card tab-content hidden">
      <h2>URL 통계 조회</h2>
      <div class="field">
        <label for="statsCode">단축 코드 입력</label>
        <div class="stats-search">
          <input type="text" id="statsCode" placeholder="short-code" />
          <button id="statsSearchBtn">조회</button>
        </div>
      </div>
      <div id="statsResult" class="stats-result hidden"></div>
      <div id="statsError" class="error-msg hidden"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
