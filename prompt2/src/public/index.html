<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🔗 URL Shortener</h1>
      <p>긴 URL을 짧게 줄이고, 클릭을 추적하세요.</p>
    </header>

    <!-- Shorten Form -->
    <div class="card">
      <h2>URL 단축하기</h2>
      <form id="shortenForm">
        <div class="form-group">
          <label for="urlInput">URL</label>
          <input type="url" id="urlInput" placeholder="https://example.com/very/long/url" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="aliasInput">커스텀 별칭 (선택)</label>
            <input type="text" id="aliasInput" placeholder="my-link">
          </div>
          <div class="form-group">
            <label for="expiresSelect">만료 기간</label>
            <select id="expiresSelect">
              <option value="0">만료 없음</option>
              <option value="60">1시간</option>
              <option value="1440">1일</option>
              <option value="10080">7일</option>
              <option value="43200">30일</option>
              <option value="525600">1년</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">단축하기</button>
      </form>

      <div class="result" id="result">
        <p>단축 URL이 생성되었습니다!</p>
        <div class="short-url" id="shortUrlDisplay"></div>
        <div class="actions">
          <button class="btn btn-sm btn-copy" id="copyBtn">복사</button>
          <a id="visitBtn" href="#" target="_blank" class="btn btn-sm btn-stats">방문</a>
        </div>
      </div>
    </div>

    <!-- URL List -->
    <div class="card">
      <h2>단축 URL 목록</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>단축 코드</th>
              <th>원본 URL</th>
              <th>클릭</th>
              <th>상태</th>
              <th>생성일</th>
              <th>작업</th>
            </tr>
          </thead>
          <tbody id="urlTableBody">
            <tr><td colspan="6" class="empty-state">로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Stats Modal -->
  <div class="modal-overlay" id="statsModal">
    <div class="modal">
      <h3>📊 클릭 통계</h3>
      <div id="statsContent"></div>
      <button class="close-btn" onclick="closeModal()">닫기</button>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
