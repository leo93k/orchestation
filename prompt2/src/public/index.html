<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL 단축 서비스</title>
  <style>
    /* ── 리셋 & 기본 ────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f0f4ff;
      color: #1e293b;
      min-height: 100vh;
    }

    /* ── 레이아웃 ────────────────────────────────── */
    header {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: #fff;
      padding: 28px 0 24px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(99,102,241,.35);
    }
    header h1 { font-size: 2rem; letter-spacing: -0.5px; }
    header p  { margin-top: 6px; opacity: .85; font-size: .95rem; }

    main { max-width: 860px; margin: 0 auto; padding: 36px 20px 60px; }

    /* ── 카드 ────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,.08);
      padding: 28px 32px;
      margin-bottom: 28px;
    }
    .card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #6366f1;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── 폼 ──────────────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .form-grid .full { grid-column: 1 / -1; }

    label { display: block; font-size: .82rem; font-weight: 600; color: #475569; margin-bottom: 5px; }
    input[type="text"], input[type="url"], input[type="number"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: .95rem;
      color: #1e293b;
      background: #f8fafc;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,.15);
      background: #fff;
    }

    /* ── 버튼 ────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 11px 26px;
      border: none;
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      box-shadow: 0 4px 14px rgba(99,102,241,.4);
    }
    .btn-primary:hover { box-shadow: 0 6px 20px rgba(99,102,241,.5); }
    .btn-sm {
      padding: 6px 14px;
      font-size: .8rem;
      border-radius: 8px;
    }
    .btn-ghost {
      background: #f1f5f9;
      color: #475569;
      box-shadow: none;
    }
    .btn-ghost:hover { background: #e2e8f0; }
    .btn-danger {
      background: #fee2e2;
      color: #ef4444;
      box-shadow: none;
    }

    /* ── 결과 박스 ───────────────────────────────── */
    #result {
      display: none;
      margin-top: 20px;
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      border-radius: 12px;
      padding: 18px 22px;
    }
    #result.error {
      background: #fff1f2;
      border-color: #fecdd3;
    }
    #result .result-url {
      font-size: 1.2rem;
      font-weight: 700;
      color: #059669;
      word-break: break-all;
    }
    #result.error .result-url { color: #e11d48; font-size: 1rem; }
    #result .result-meta {
      margin-top: 8px;
      font-size: .82rem;
      color: #64748b;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }
    .copy-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; flex-wrap: wrap; }

    /* ── 탭 ──────────────────────────────────────── */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
    .tab-btn {
      padding: 8px 18px;
      border: none;
      background: #f1f5f9;
      border-radius: 8px;
      font-size: .88rem;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      transition: all .2s;
    }
    .tab-btn.active { background: #6366f1; color: #fff; }

    /* ── URL 목록 테이블 ─────────────────────────── */
    .url-table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    .url-table th {
      text-align: left;
      padding: 10px 12px;
      background: #f8fafc;
      color: #475569;
      font-weight: 700;
      border-bottom: 2px solid #e2e8f0;
    }
    .url-table td {
      padding: 11px 12px;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: middle;
    }
    .url-table tr:last-child td { border-bottom: none; }
    .url-table tr:hover td { background: #fafbff; }

    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 700;
    }
    .badge-active  { background: #d1fae5; color: #059669; }
    .badge-expired { background: #fee2e2; color: #ef4444; }
    .badge-noexp   { background: #e0e7ff; color: #6366f1; }

    .code-link { font-family: monospace; font-weight: 700; color: #6366f1; text-decoration: none; }
    .code-link:hover { text-decoration: underline; }

    .original-url {
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #475569;
      font-size: .83rem;
    }

    /* ── 통계 패널 ───────────────────────────────── */
    #stats-panel { display: none; }
    #stats-panel.visible { display: block; }

    .stats-info-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 22px;
    }
    .stat-box {
      background: #f8fafc;
      border-radius: 12px;
      padding: 16px 18px;
      text-align: center;
    }
    .stat-box .val { font-size: 2rem; font-weight: 800; color: #6366f1; }
    .stat-box .lbl { font-size: .78rem; color: #64748b; margin-top: 2px; }

    /* ── 바 차트 ─────────────────────────────────── */
    .chart-wrap { overflow-x: auto; }
    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 160px;
      padding: 10px 0 0;
    }
    .bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      min-width: 28px;
    }
    .bar-val { font-size: .72rem; color: #64748b; margin-bottom: 3px; }
    .bar {
      width: 100%;
      background: linear-gradient(180deg, #818cf8, #6366f1);
      border-radius: 5px 5px 0 0;
      min-height: 3px;
      transition: height .4s ease;
    }
    .bar-label { font-size: .65rem; color: #94a3b8; margin-top: 5px; transform: rotate(-30deg); white-space: nowrap; }

    /* ── 공통 ────────────────────────────────────── */
    .empty { text-align: center; color: #94a3b8; padding: 36px 0; font-size: .95rem; }
    .loader { text-align: center; padding: 30px; color: #94a3b8; }
    .actions { display: flex; gap: 6px; }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .stats-info-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>🔗 URL 단축 서비스</h1>
  <p>긴 URL을 짧고 기억하기 쉽게 만들어보세요</p>
</header>

<main>

  <!-- ── 단축 생성 카드 ── -->
  <div class="card">
    <h2>✂️ URL 단축하기</h2>
    <form id="shorten-form">
      <div class="form-grid">
        <div class="full">
          <label for="url-input">원본 URL *</label>
          <input id="url-input" type="url" placeholder="https://example.com/very/long/url" required />
        </div>
        <div>
          <label for="custom-code">커스텀 코드 (선택)</label>
          <input id="custom-code" type="text" placeholder="my-link" maxlength="30" />
        </div>
        <div>
          <label for="expires-in">만료 기간 (일, 선택)</label>
          <input id="expires-in" type="number" placeholder="예: 7 (비워두면 영구)" min="1" max="3650" />
        </div>
      </div>
      <br />
      <button type="submit" class="btn btn-primary">🚀 단축 URL 생성</button>
    </form>

    <!-- 결과 -->
    <div id="result">
      <div id="result-message"></div>
    </div>
  </div>

  <!-- ── URL 목록 / 통계 탭 ── -->
  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" data-tab="list">📋 단축 URL 목록</button>
      <button class="tab-btn" data-tab="stats">📊 클릭 통계</button>
    </div>

    <!-- 목록 탭 -->
    <div id="tab-list">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <span id="url-count" style="font-size:.85rem;color:#64748b;"></span>
        <button class="btn btn-ghost btn-sm" onclick="loadUrls()">🔄 새로고침</button>
      </div>
      <div id="url-list-wrap">
        <div class="loader">로딩 중…</div>
      </div>
    </div>

    <!-- 통계 탭 -->
    <div id="tab-stats" style="display:none;">
      <div style="margin-bottom:14px;">
        <label for="stats-code-input" style="font-size:.85rem;">단축 코드 또는 단축 URL 입력</label>
        <div style="display:flex;gap:8px;margin-top:5px;">
          <input id="stats-code-input" type="text" placeholder="abc123" style="flex:1;" />
          <button class="btn btn-primary btn-sm" onclick="loadStats()">조회</button>
        </div>
      </div>
      <div id="stats-panel"></div>
    </div>
  </div>

</main>

<script>
/* ── 탭 전환 ──────────────────────────────────────────── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById('tab-list').style.display  = tab === 'list'  ? 'block' : 'none';
    document.getElementById('tab-stats').style.display = tab === 'stats' ? 'block' : 'none';
  });
});

/* ── 단축 URL 생성 폼 ─────────────────────────────────── */
document.getElementById('shorten-form').addEventListener('submit', async e => {
  e.preventDefault();
  const url         = document.getElementById('url-input').value.trim();
  const customCode  = document.getElementById('custom-code').value.trim();
  const expiresIn   = document.getElementById('expires-in').value.trim();

  const body = { url };
  if (customCode) body.customCode = customCode;
  if (expiresIn)  body.expiresInDays = Number(expiresIn);

  try {
    const res  = await fetch('/api/shorten', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();

    const box = document.getElementById('result');
    const msg = document.getElementById('result-message');
    box.style.display = 'block';

    if (!res.ok) {
      box.className = 'error';
      msg.innerHTML = `<div class="result-url">⚠️ ${escHtml(data.error)}</div>`;
      return;
    }

    box.className = '';
    const expiry = data.expiresAt
      ? `만료: ${data.expiresAt.slice(0, 10)}`
      : '만료 없음';

    msg.innerHTML = `
      <div class="result-url">${escHtml(data.shortUrl)}</div>
      <div class="copy-row">
        <button class="btn btn-ghost btn-sm" onclick="copyText('${escHtml(data.shortUrl)}')">📋 복사</button>
        <span style="font-size:.82rem;color:#64748b;">${expiry}</span>
      </div>
      <div class="result-meta">
        <span>원본: <a href="${escHtml(data.original)}" target="_blank" rel="noopener">${ellipsis(data.original, 60)}</a></span>
      </div>`;

    // 폼 초기화
    document.getElementById('shorten-form').reset();
    // 목록 갱신
    loadUrls();
  } catch {
    showResultError('서버에 연결할 수 없습니다.');
  }
});

/* ── URL 목록 로드 ────────────────────────────────────── */
async function loadUrls() {
  const wrap = document.getElementById('url-list-wrap');
  wrap.innerHTML = '<div class="loader">로딩 중…</div>';

  try {
    const res  = await fetch('/api/urls');
    const urls = await res.json();
    document.getElementById('url-count').textContent = `총 ${urls.length}개`;

    if (urls.length === 0) {
      wrap.innerHTML = '<div class="empty">아직 단축된 URL이 없습니다.</div>';
      return;
    }

    wrap.innerHTML = `
      <div style="overflow-x:auto;">
        <table class="url-table">
          <thead>
            <tr>
              <th>코드</th>
              <th>원본 URL</th>
              <th>클릭</th>
              <th>상태</th>
              <th>생성일</th>
              <th>작업</th>
            </tr>
          </thead>
          <tbody>
            ${urls.map(u => renderRow(u)).join('')}
          </tbody>
        </table>
      </div>`;
  } catch {
    wrap.innerHTML = '<div class="empty">목록을 불러올 수 없습니다.</div>';
  }
}

function renderRow(u) {
  const statusBadge = u.expired
    ? '<span class="badge badge-expired">만료됨</span>'
    : u.expiresAt
      ? `<span class="badge badge-active">활성 (${u.expiresAt.slice(0,10)})</span>`
      : '<span class="badge badge-noexp">영구</span>';

  return `<tr>
    <td><a class="code-link" href="/${escHtml(u.code)}" target="_blank">${escHtml(u.code)}</a></td>
    <td><div class="original-url" title="${escHtml(u.original)}">${escHtml(u.original)}</div></td>
    <td><b>${u.clicks}</b></td>
    <td>${statusBadge}</td>
    <td style="font-size:.8rem;color:#94a3b8;">${u.createdAt.slice(0,10)}</td>
    <td>
      <div class="actions">
        <button class="btn btn-ghost btn-sm" onclick="copyText('${escHtml(u.shortUrl)}')">📋</button>
        <button class="btn btn-ghost btn-sm" onclick="viewStats('${escHtml(u.code)}')">📊</button>
      </div>
    </td>
  </tr>`;
}

/* ── 클릭 통계 로드 ───────────────────────────────────── */
function viewStats(code) {
  // 탭 전환
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-tab="stats"]').classList.add('active');
  document.getElementById('tab-list').style.display  = 'none';
  document.getElementById('tab-stats').style.display = 'block';

  document.getElementById('stats-code-input').value = code;
  loadStats();
}

async function loadStats() {
  const raw   = document.getElementById('stats-code-input').value.trim();
  const panel = document.getElementById('stats-panel');

  if (!raw) return;

  // 전체 URL에서 코드 추출
  let code = raw;
  try {
    const u = new URL(raw);
    code = u.pathname.replace(/^\//, '');
  } catch {}

  panel.innerHTML = '<div class="loader">로딩 중…</div>';

  try {
    const res  = await fetch(`/api/stats/${encodeURIComponent(code)}`);
    const data = await res.json();

    if (!res.ok) {
      panel.innerHTML = `<div class="empty">⚠️ ${escHtml(data.error)}</div>`;
      return;
    }

    const totalDays  = data.dailyClicks.length;
    const maxClicks  = data.dailyClicks.reduce((m, d) => Math.max(m, d.count), 1);
    const expiry     = data.expiresAt ? data.expiresAt.slice(0, 10) : '없음';

    panel.innerHTML = `
      <div class="stats-info-grid">
        <div class="stat-box"><div class="val">${data.clicks}</div><div class="lbl">총 클릭 수</div></div>
        <div class="stat-box"><div class="val">${totalDays}</div><div class="lbl">기록된 일수 (최근 30일)</div></div>
        <div class="stat-box"><div class="val">${expiry}</div><div class="lbl">만료일</div></div>
      </div>
      <div style="margin-bottom:8px;font-size:.85rem;color:#64748b;">
        원본: <a href="${escHtml(data.original)}" target="_blank" rel="noopener">${ellipsis(data.original, 60)}</a>
      </div>
      <div style="margin-bottom:14px;font-size:.85rem;color:#64748b;">
        단축 URL: <a href="${escHtml(data.shortUrl)}" target="_blank">${escHtml(data.shortUrl)}</a>
      </div>
      <div class="chart-wrap">
        <div class="bar-chart">
          ${data.dailyClicks.length === 0
            ? '<div style="margin:auto;color:#94a3b8;">최근 30일간 클릭 데이터가 없습니다.</div>'
            : data.dailyClicks.map(d => {
                const pct = Math.max(6, Math.round((d.count / maxClicks) * 140));
                const label = d.day.slice(5); // MM-DD
                return `<div class="bar-col">
                  <div class="bar-val">${d.count}</div>
                  <div class="bar" style="height:${pct}px;"></div>
                  <div class="bar-label">${label}</div>
                </div>`;
              }).join('')
          }
        </div>
      </div>`;
  } catch {
    panel.innerHTML = '<div class="empty">통계를 불러올 수 없습니다.</div>';
  }
}

/* ── 유틸 ─────────────────────────────────────────────── */
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function ellipsis(str, max) {
  return str.length > max ? str.slice(0, max) + '…' : str;
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    alert('클립보드에 복사되었습니다!');
  } catch {
    prompt('직접 복사해주세요:', text);
  }
}

function showResultError(msg) {
  const box = document.getElementById('result');
  box.style.display = 'block';
  box.className = 'error';
  document.getElementById('result-message').innerHTML =
    `<div class="result-url">⚠️ ${escHtml(msg)}</div>`;
}

/* ── 초기 로드 ─────────────────────────────────────────── */
loadUrls();
</script>

</body>
</html>
