<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL 단축 서비스</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<header>
  <div class="inner">
    <span class="logo">🔗</span>
    <h1>URL 단축 서비스</h1>
  </div>
</header>

<div class="container">

  <!-- Shorten Form -->
  <div class="card">
    <h2>✂️ URL 단축하기</h2>
    <form id="shortenForm" class="form-row">
      <div class="form-group">
        <label for="urlInput">원본 URL</label>
        <input type="url" id="urlInput" placeholder="https://example.com/very/long/url" required />
      </div>
      <div class="row2">
        <div class="form-group">
          <label for="customCode">커스텀 코드 (선택)</label>
          <input type="text" id="customCode" placeholder="예: mylink (영문/숫자만)" maxlength="30" />
        </div>
        <div class="form-group">
          <label for="expiresIn">만료 기간 (일, 선택)</label>
          <input type="number" id="expiresIn" placeholder="예: 7 (비우면 무제한)" min="1" max="3650" />
        </div>
      </div>
      <div>
        <button type="submit" class="btn btn-primary">🔗 단축 URL 생성</button>
      </div>
    </form>

    <div class="result-box" id="resultBox">
      <div class="label">생성된 단축 URL</div>
      <div class="result-url">
        <a id="resultLink" href="#" target="_blank"></a>
        <button class="copy-btn" id="copyBtn">복사</button>
      </div>
    </div>
  </div>

  <!-- URL List -->
  <div class="card">
    <h2>📋 단축 URL 목록
      <button class="btn btn-sm btn-primary refresh-btn" onclick="loadUrls()">↻ 새로고침</button>
    </h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>단축 코드</th>
            <th>원본 URL</th>
            <th>클릭 수</th>
            <th>만료일</th>
            <th>생성일</th>
            <th>삭제</th>
          </tr>
        </thead>
        <tbody id="urlTableBody">
          <tr><td colspan="6" class="empty">로딩 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
const BASE = window.location.origin;

// Format date (ISO -> KR)
function fmtDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' });
}

function isExpired(expiresAt) {
  if (!expiresAt) return false;
  return new Date(expiresAt) < new Date();
}

// Load URLs
async function loadUrls() {
  const tbody = document.getElementById('urlTableBody');
  try {
    const res = await fetch('/api/urls');
    const data = await res.json();

    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">아직 생성된 URL이 없습니다.</td></tr>';
      return;
    }

    tbody.innerHTML = data.map(row => {
      const expired = isExpired(row.expires_at);
      let statusBadge;
      if (!row.expires_at) statusBadge = '<span class="badge badge-forever">무제한</span>';
      else if (expired) statusBadge = '<span class="badge badge-expired">만료</span>';
      else statusBadge = `<span class="badge badge-active">${fmtDate(row.expires_at)}까지</span>`;

      return `<tr>
        <td><a class="short-link" href="${BASE}/${row.short_code}" target="_blank">${row.short_code}</a></td>
        <td><a class="original-url" href="${row.original_url}" target="_blank" title="${row.original_url}">${row.original_url}</a></td>
        <td><span class="clicks">👁 ${row.click_count.toLocaleString()}</span></td>
        <td>${statusBadge}</td>
        <td>${fmtDate(row.created_at)}</td>
        <td><button class="btn btn-sm btn-danger" onclick="deleteUrl('${row.short_code}')">삭제</button></td>
      </tr>`;
    }).join('');
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">데이터를 불러오지 못했습니다.</td></tr>';
  }
}

// Delete URL
async function deleteUrl(code) {
  if (!confirm(`"${code}" 을 삭제하시겠습니까?`)) return;
  try {
    const res = await fetch(`/api/urls/${code}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.success) loadUrls();
    else alert(data.error || '삭제 실패');
  } catch {
    alert('삭제 중 오류가 발생했습니다.');
  }
}

// Shorten form submit
document.getElementById('shortenForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const resultBox = document.getElementById('resultBox');
  resultBox.className = 'result-box';

  const url = document.getElementById('urlInput').value.trim();
  const customCode = document.getElementById('customCode').value.trim();
  const expiresIn = document.getElementById('expiresIn').value.trim();

  // Client-side validation
  if (!/^https?:\/\//i.test(url)) {
    resultBox.className = 'result-box error';
    resultBox.innerHTML = '<p class="error-msg">❌ http:// 또는 https://로 시작하는 URL만 입력 가능합니다.</p>';
    return;
  }

  if (customCode && !/^[a-zA-Z0-9]+$/.test(customCode)) {
    resultBox.className = 'result-box error';
    resultBox.innerHTML = '<p class="error-msg">❌ 커스텀 코드는 영문자와 숫자만 사용 가능합니다.</p>';
    return;
  }

  try {
    const res = await fetch('/api/shorten', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, customCode: customCode || undefined, expiresIn: expiresIn || undefined })
    });
    const data = await res.json();

    if (!res.ok) {
      resultBox.className = 'result-box error';
      resultBox.innerHTML = `<p class="error-msg">❌ ${data.error}</p>`;
    } else {
      resultBox.className = 'result-box success';
      resultBox.innerHTML = `
        <div class="label">✅ 생성된 단축 URL</div>
        <div class="result-url">
          <a id="resultLink" href="${data.shortUrl}" target="_blank">${data.shortUrl}</a>
          <button class="copy-btn" onclick="navigator.clipboard.writeText('${data.shortUrl}').then(()=>{ this.textContent='✓ 복사됨'; setTimeout(()=>this.textContent='복사',1500); })">복사</button>
        </div>`;
      document.getElementById('shortenForm').reset();
      loadUrls();
    }
  } catch {
    resultBox.className = 'result-box error';
    resultBox.innerHTML = '<p class="error-msg">❌ 서버와 통신에 실패했습니다.</p>';
  }
});

// Initial load
loadUrls();
</script>
</body>
</html>
