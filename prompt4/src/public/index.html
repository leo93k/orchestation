<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL 단축기</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e0e0e0;
      padding: 24px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    header p {
      color: #94a3b8;
      font-size: 1rem;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 32px;
      backdrop-filter: blur(10px);
    }

    .card h2 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #c4b5fd;
      margin-bottom: 20px;
      letter-spacing: 0.02em;
    }

    /* Form */
    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 200px;
    }

    .form-group.full {
      flex-basis: 100%;
      min-width: unset;
    }

    label {
      font-size: 0.85rem;
      color: #94a3b8;
    }

    input[type="text"],
    input[type="url"],
    select {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 10px 14px;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    input[type="text"]:focus,
    input[type="url"]:focus,
    select:focus {
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.2);
    }

    select option {
      background: #1e293b;
    }

    input::placeholder {
      color: #64748b;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(90deg, #7c3aed, #3b82f6);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      opacity: 0.9;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #c4b5fd;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.15);
    }

    .btn-sm {
      padding: 5px 12px;
      font-size: 0.82rem;
    }

    .btn-copy {
      background: linear-gradient(90deg, #7c3aed, #3b82f6);
      color: #fff;
      padding: 6px 14px;
      font-size: 0.85rem;
    }

    .btn-copy:hover {
      opacity: 0.85;
    }

    .form-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }

    /* Result box */
    #result-box {
      display: none;
      margin-top: 20px;
      background: rgba(124, 58, 237, 0.1);
      border: 1px solid rgba(124, 58, 237, 0.35);
      border-radius: 10px;
      padding: 16px 20px;
    }

    #result-box .result-label {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    #result-box .result-url-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    #result-box a {
      color: #a78bfa;
      font-size: 1.05rem;
      font-weight: 600;
      word-break: break-all;
      text-decoration: none;
    }

    #result-box a:hover {
      text-decoration: underline;
    }

    /* Notification */
    #notification {
      display: none;
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      max-width: 360px;
      animation: fadeIn 0.2s ease;
    }

    #notification.success {
      background: rgba(52, 211, 153, 0.15);
      border: 1px solid #34d399;
      color: #6ee7b7;
    }

    #notification.error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid #ef4444;
      color: #fca5a5;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Table section */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .section-header h2 {
      margin-bottom: 0;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead tr {
      background: rgba(167, 139, 250, 0.1);
    }

    thead th {
      padding: 12px 14px;
      text-align: left;
      color: #c4b5fd;
      font-weight: 600;
      white-space: nowrap;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    tbody tr {
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      transition: background 0.15s;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    tbody td {
      padding: 12px 14px;
      vertical-align: middle;
      color: #cbd5e1;
    }

    tbody td.code {
      font-family: 'Courier New', monospace;
      color: #a78bfa;
      font-weight: 600;
    }

    tbody td.url {
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tbody td.url a {
      color: #60a5fa;
      text-decoration: none;
    }

    tbody td.url a:hover {
      text-decoration: underline;
    }

    tbody td.clicks {
      text-align: center;
      font-weight: 600;
      color: #34d399;
    }

    tbody td.expired {
      color: #f87171 !important;
    }

    tr.expired-row td {
      color: #f87171;
    }

    tr.expired-row td.code {
      color: #f87171;
    }

    /* Stats detail row */
    .stats-row {
      display: none;
    }

    .stats-row.open {
      display: table-row;
    }

    .stats-detail {
      background: rgba(124, 58, 237, 0.07);
      border-left: 3px solid #7c3aed;
      padding: 14px 20px;
      border-radius: 0 8px 8px 0;
      font-size: 0.88rem;
    }

    .stats-detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px 24px;
    }

    .stats-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stats-item .key {
      color: #94a3b8;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .stats-item .value {
      color: #e2e8f0;
      font-weight: 500;
    }

    .empty-state {
      text-align: center;
      color: #64748b;
      padding: 48px 0;
      font-size: 0.95rem;
    }

    #loading-indicator {
      display: none;
      text-align: center;
      color: #94a3b8;
      padding: 32px 0;
      font-size: 0.9rem;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(167, 139, 250, 0.3);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      header h1 { font-size: 1.8rem; }
      .card { padding: 20px; }
      .form-group { min-width: 100%; }
    }
  </style>
</head>
<body>

<div id="notification" role="alert"></div>

<div class="container">
  <header>
    <h1>URL 단축기</h1>
    <p>긴 URL을 짧고 기억하기 쉬운 링크로 변환하세요</p>
  </header>

  <!-- Section 1: Shorten Form -->
  <div class="card">
    <h2>URL 단축하기</h2>
    <form id="shorten-form" novalidate>
      <div class="form-row">
        <div class="form-group full">
          <label for="original-url">원본 URL <span style="color:#f87171">*</span></label>
          <input
            type="url"
            id="original-url"
            placeholder="https://example.com/very/long/url"
            required
          />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="custom-code">커스텀 코드</label>
          <input
            type="text"
            id="custom-code"
            placeholder="커스텀 코드 (선택)"
            maxlength="32"
          />
        </div>
        <div class="form-group">
          <label for="expires-in">만료 기간</label>
          <select id="expires-in">
            <option value="">없음</option>
            <option value="1">1일</option>
            <option value="7">7일</option>
            <option value="30">30일</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="submit-btn">
          단축하기
        </button>
      </div>
    </form>

    <div id="result-box">
      <p class="result-label">단축된 URL</p>
      <div class="result-url-row">
        <a id="result-link" href="#" target="_blank" rel="noopener noreferrer"></a>
        <button class="btn btn-copy btn-sm" id="copy-btn" type="button">복사</button>
      </div>
    </div>
  </div>

  <!-- Section 2: URL List -->
  <div class="card">
    <div class="section-header">
      <h2>등록된 URL 목록</h2>
      <button class="btn btn-secondary" id="refresh-btn" type="button">
        목록 새로고침
      </button>
    </div>

    <div id="loading-indicator">
      <span class="spinner"></span>불러오는 중...
    </div>

    <div class="table-wrapper" id="table-wrapper">
      <table id="url-table">
        <thead>
          <tr>
            <th>단축 코드</th>
            <th>원본 URL</th>
            <th style="text-align:center">클릭 수</th>
            <th>생성일</th>
            <th>만료일</th>
            <th style="text-align:center">통계</th>
          </tr>
        </thead>
        <tbody id="url-tbody">
        </tbody>
      </table>
      <div id="empty-state" class="empty-state" style="display:none">
        등록된 URL이 없습니다.
      </div>
    </div>
  </div>
</div>

<script>
  // ── Utilities ──────────────────────────────────────────────────

  function showNotification(message, type = 'success') {
    const el = document.getElementById('notification');
    el.textContent = message;
    el.className = type;
    el.style.display = 'block';
    clearTimeout(el._timer);
    el._timer = setTimeout(() => { el.style.display = 'none'; }, 3500);
  }

  function formatDate(dateStr) {
    if (!dateStr) return '-';
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return '-';
    return d.toLocaleDateString('ko-KR', {
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function isExpired(expiresAt) {
    if (!expiresAt) return false;
    return new Date(expiresAt) < new Date();
  }

  // ── API calls ──────────────────────────────────────────────────

  async function apiPost(url, body) {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || data.message || '요청 실패');
    return data;
  }

  async function apiGet(url) {
    const res = await fetch(url);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || data.message || '요청 실패');
    return data;
  }

  // ── Shorten Form ───────────────────────────────────────────────

  const shortenForm = document.getElementById('shorten-form');
  const submitBtn   = document.getElementById('submit-btn');
  const resultBox   = document.getElementById('result-box');
  const resultLink  = document.getElementById('result-link');
  const copyBtn     = document.getElementById('copy-btn');

  shortenForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const originalUrl = document.getElementById('original-url').value.trim();
    const customCode  = document.getElementById('custom-code').value.trim() || undefined;
    const expiresInDaysRaw = document.getElementById('expires-in').value;
    const expiresInDays = expiresInDaysRaw ? parseInt(expiresInDaysRaw, 10) : undefined;

    if (!originalUrl) {
      showNotification('원본 URL을 입력해 주세요.', 'error');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = '처리 중...';

    try {
      const payload = { originalUrl };
      if (customCode)   payload.customCode   = customCode;
      if (expiresInDays) payload.expiresInDays = expiresInDays;

      const data = await apiPost('/api/shorten', payload);

      const shortUrl = data.shortUrl || `${location.origin}/${data.shortCode}`;
      resultLink.href        = shortUrl;
      resultLink.textContent = shortUrl;
      resultBox.style.display = 'block';

      showNotification('URL이 성공적으로 단축되었습니다!', 'success');
      shortenForm.reset();
      loadUrls();
    } catch (err) {
      showNotification(err.message || '오류가 발생했습니다.', 'error');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = '단축하기';
    }
  });

  copyBtn.addEventListener('click', async () => {
    const url = resultLink.href;
    try {
      await navigator.clipboard.writeText(url);
      copyBtn.textContent = '복사됨!';
      setTimeout(() => { copyBtn.textContent = '복사'; }, 2000);
    } catch {
      // fallback
      const ta = document.createElement('textarea');
      ta.value = url;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      copyBtn.textContent = '복사됨!';
      setTimeout(() => { copyBtn.textContent = '복사'; }, 2000);
    }
  });

  // ── URL Table ──────────────────────────────────────────────────

  const tbody          = document.getElementById('url-tbody');
  const emptyState     = document.getElementById('empty-state');
  const loadingIndicator = document.getElementById('loading-indicator');
  const tableWrapper   = document.getElementById('table-wrapper');

  // Track which rows have stats open (by shortCode)
  const openStats = new Set();

  async function loadUrls() {
    loadingIndicator.style.display = 'block';
    tableWrapper.style.display = 'none';

    try {
      const urls = await apiGet('/api/urls');
      renderTable(urls);
    } catch (err) {
      showNotification('URL 목록을 불러오지 못했습니다: ' + err.message, 'error');
      renderTable([]);
    } finally {
      loadingIndicator.style.display = 'none';
      tableWrapper.style.display = 'block';
    }
  }

  function renderTable(urls) {
    tbody.innerHTML = '';

    if (!urls || urls.length === 0) {
      emptyState.style.display = 'block';
      document.getElementById('url-table').style.display = 'none';
      return;
    }

    emptyState.style.display = 'none';
    document.getElementById('url-table').style.display = 'table';

    urls.forEach(item => {
      const expired = isExpired(item.expiresAt);
      const mainRow = document.createElement('tr');
      if (expired) mainRow.classList.add('expired-row');
      mainRow.dataset.code = item.shortCode;

      const shortUrl = `${location.origin}/${item.shortCode}`;

      mainRow.innerHTML = `
        <td class="code">${escapeHtml(item.shortCode)}</td>
        <td class="url">
          <a href="${escapeHtml(item.originalUrl)}" target="_blank" rel="noopener noreferrer"
             title="${escapeHtml(item.originalUrl)}">
            ${escapeHtml(truncate(item.originalUrl, 50))}
          </a>
        </td>
        <td class="clicks">${item.clicks ?? 0}</td>
        <td class="${expired ? 'expired' : ''}">${formatDate(item.createdAt)}</td>
        <td class="${expired ? 'expired' : ''}">${item.expiresAt ? formatDate(item.expiresAt) + (expired ? ' (만료됨)' : '') : '없음'}</td>
        <td style="text-align:center">
          <button class="btn btn-secondary btn-sm stats-toggle-btn" data-code="${escapeHtml(item.shortCode)}" type="button">
            통계
          </button>
        </td>
      `;

      const statsRow = document.createElement('tr');
      statsRow.classList.add('stats-row');
      statsRow.dataset.statsFor = item.shortCode;
      statsRow.innerHTML = `
        <td colspan="6" style="padding:0">
          <div class="stats-detail" id="stats-detail-${escapeHtml(item.shortCode)}">
            <div class="spinner" style="display:inline-block"></div> 불러오는 중...
          </div>
        </td>
      `;

      // Restore open state if it was open before refresh
      if (openStats.has(item.shortCode)) {
        statsRow.classList.add('open');
        loadStats(item.shortCode);
      }

      tbody.appendChild(mainRow);
      tbody.appendChild(statsRow);
    });

    // Attach toggle listeners
    tbody.querySelectorAll('.stats-toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const code = btn.dataset.code;
        toggleStats(code);
      });
    });
  }

  async function toggleStats(code) {
    const statsRow = tbody.querySelector(`tr[data-stats-for="${CSS.escape(code)}"]`);
    if (!statsRow) return;

    const isOpen = statsRow.classList.contains('open');

    if (isOpen) {
      statsRow.classList.remove('open');
      openStats.delete(code);
    } else {
      statsRow.classList.add('open');
      openStats.add(code);
      await loadStats(code);
    }
  }

  async function loadStats(code) {
    const detailEl = document.getElementById(`stats-detail-${code}`);
    if (!detailEl) return;

    detailEl.innerHTML = '<span class="spinner"></span> 불러오는 중...';

    try {
      const stats = await apiGet(`/api/urls/${encodeURIComponent(code)}/stats`);
      detailEl.innerHTML = `
        <div class="stats-detail-grid">
          <div class="stats-item">
            <span class="key">단축 코드</span>
            <span class="value">${escapeHtml(stats.shortCode)}</span>
          </div>
          <div class="stats-item">
            <span class="key">원본 URL</span>
            <span class="value" style="word-break:break-all">${escapeHtml(stats.originalUrl)}</span>
          </div>
          <div class="stats-item">
            <span class="key">총 클릭 수</span>
            <span class="value" style="color:#34d399;font-size:1.1rem">${stats.clicks ?? 0}</span>
          </div>
          <div class="stats-item">
            <span class="key">생성일</span>
            <span class="value">${formatDate(stats.createdAt)}</span>
          </div>
          <div class="stats-item">
            <span class="key">만료일</span>
            <span class="value ${isExpired(stats.expiresAt) ? 'expired' : ''}">
              ${stats.expiresAt ? formatDate(stats.expiresAt) + (isExpired(stats.expiresAt) ? ' (만료됨)' : '') : '없음'}
            </span>
          </div>
        </div>
      `;
    } catch (err) {
      detailEl.innerHTML = `<span style="color:#f87171">통계를 불러오지 못했습니다: ${escapeHtml(err.message)}</span>`;
    }
  }

  // ── Helpers ────────────────────────────────────────────────────

  function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function truncate(str, maxLen) {
    if (!str) return '';
    return str.length > maxLen ? str.slice(0, maxLen) + '…' : str;
  }

  // ── Refresh button ─────────────────────────────────────────────

  document.getElementById('refresh-btn').addEventListener('click', loadUrls);

  // ── Init ───────────────────────────────────────────────────────
  loadUrls();
</script>
</body>
</html>
