<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL 단축 서비스</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🔗 URL 단축 서비스</h1>
      <p class="subtitle">긴 URL을 짧고 간결하게 만들어 보세요</p>
    </header>

    <!-- 생성 폼 -->
    <section class="card create-card">
      <h2>단축 URL 만들기</h2>
      <form id="createForm">
        <div class="form-group">
          <label for="originalUrl">원본 URL <span class="required">*</span></label>
          <input type="text" id="originalUrl" placeholder="https://example.com/very/long/url" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="customCode">커스텀 코드 (선택)</label>
            <input type="text" id="customCode" placeholder="my-link (영문/숫자만)" maxlength="20" />
          </div>
          <div class="form-group">
            <label for="expiresIn">만료 기간 (선택)</label>
            <select id="expiresIn">
              <option value="">만료 없음</option>
              <option value="1">1일</option>
              <option value="7">7일</option>
              <option value="30">30일</option>
              <option value="90">90일</option>
              <option value="365">1년</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">단축하기</button>
      </form>

      <div id="resultBox" class="result-box hidden">
        <p class="result-label">단축 URL이 생성되었습니다!</p>
        <div class="result-url-row">
          <a id="resultLink" href="#" target="_blank"></a>
          <button class="btn btn-copy" onclick="copyResult()">복사</button>
        </div>
        <span id="copyMsg" class="copy-msg hidden">복사됨!</span>
      </div>

      <div id="errorBox" class="error-box hidden"></div>
    </section>

    <!-- URL 목록 -->
    <section class="card list-card">
      <div class="list-header">
        <h2>단축 URL 목록</h2>
        <button class="btn btn-secondary" onclick="loadUrls()">새로고침</button>
      </div>
      <div id="urlList" class="url-list">
        <p class="loading">불러오는 중...</p>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
