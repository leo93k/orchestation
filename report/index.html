<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111113;
      color: #edeef0;
      min-height: 100vh;
    }
    .container { max-width: 720px; margin: 0 auto; padding: 48px 24px; }
    h1 { font-size: 1.4rem; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .sub { color: #6e6e80; font-size: 0.82rem; margin-bottom: 32px; }

    .list { display: flex; flex-direction: column; gap: 10px; }
    .item {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #191a1f;
      border: 1px solid #2a2a30;
      border-radius: 10px;
      padding: 16px 20px;
      text-decoration: none;
      color: #edeef0;
      transition: border-color 0.15s, background 0.15s;
    }
    .item:hover { border-color: #3a3a45; background: #1e1e24; }
    .item-icon {
      width: 36px; height: 36px;
      background: #1e1e24;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .item-body { flex: 1; min-width: 0; }
    .item-name { font-size: 0.88rem; font-weight: 600; color: #fff; }
    .item-meta { font-size: 0.72rem; color: #6e6e80; margin-top: 2px; }
    .item-stats {
      display: flex; gap: 12px;
      font-size: 0.72rem; color: #8b8d98;
      flex-shrink: 0;
    }
    .item-stats span { white-space: nowrap; }
    .item-arrow { color: #3a3a45; font-size: 1.1rem; flex-shrink: 0; }
    .item:hover .item-arrow { color: #6e6e80; }

    .empty { text-align: center; color: #6e6e80; padding: 60px 0; }

    .loading { text-align: center; color: #6e6e80; padding: 40px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Reports</h1>
    <p class="sub" id="sub"></p>
    <div class="list" id="list"><div class="loading">Loading...</div></div>
  </div>

  <script>
    async function init() {
      const list = document.getElementById('list');
      const sub = document.getElementById('sub');

      try {
        const res = await fetch('./reports.json');
        const items = await res.json();

        if (!items.length) {
          list.innerHTML = '<div class="empty">리포트가 없습니다.</div>';
          return;
        }

        sub.textContent = `${items.length}개 리포트`;

        items.forEach(it => {
          const m = it.dir.match(/report_(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})/);
          it.date = m ? `${m[1]}-${m[2]}-${m[3]} ${m[4]}:${m[5]}:${m[6]}` : '';
        });

        list.innerHTML = items.map((it, i) => `
          <a class="item" href="./${it.dir}/">
            <div class="item-icon">#${items.length - i}</div>
            <div class="item-body">
              <div class="item-name">${it.dir}</div>
              <div class="item-meta">${it.date}</div>
            </div>
            <div class="item-stats">
              <span>${it.prompts} prompts</span>
              <span>$${it.cost.toFixed(2)}</span>
            </div>
            <div class="item-arrow">&#x203A;</div>
          </a>
        `).join('');

      } catch (e) {
        list.innerHTML = '<div class="empty">리포트 목록을 불러올 수 없습니다.</div>';
      }
    }

    init();
  </script>
</body>
</html>
