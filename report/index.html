<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111113;
      color: #edeef0;
      min-height: 100vh;
    }
    .container { max-width: 720px; margin: 0 auto; padding: 48px 24px; }
    h1 { font-size: 1.4rem; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .sub { color: #6e6e80; font-size: 0.82rem; margin-bottom: 32px; }

    /* PRD 그룹 */
    .prd-group { margin-bottom: 28px; }
    .prd-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding: 0 4px;
    }
    .prd-icon {
      width: 28px; height: 28px;
      background: #1a2e1f;
      color: #30a46c;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .prd-title { font-size: 0.95rem; font-weight: 600; color: #fff; }
    .prd-count {
      font-size: 0.68rem;
      color: #6e6e80;
      background: #1e1e24;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .prd-preview {
      font-size: 0.72rem;
      color: #6e6e80;
      padding: 0 4px 8px 42px;
      line-height: 1.4;
    }

    .list { display: flex; flex-direction: column; gap: 8px; }
    .item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #191a1f;
      border: 1px solid #2a2a30;
      border-radius: 10px;
      padding: 14px 18px;
      text-decoration: none;
      color: #edeef0;
      transition: border-color 0.15s, background 0.15s;
    }
    .item:hover { border-color: #3a3a45; background: #1e1e24; }
    .item-num {
      width: 32px; height: 32px;
      background: #1e1e24;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      color: #8b8d98;
      font-weight: 600;
      flex-shrink: 0;
    }
    .item-body { flex: 1; min-width: 0; }
    .item-name { font-size: 0.82rem; font-weight: 600; color: #fff; }
    .item-meta { font-size: 0.68rem; color: #6e6e80; margin-top: 2px; }
    .item-stats {
      display: flex; gap: 12px;
      font-size: 0.7rem; color: #8b8d98;
      flex-shrink: 0;
    }
    .item-stats span { white-space: nowrap; }
    .item-arrow { color: #3a3a45; font-size: 1rem; flex-shrink: 0; }
    .item:hover .item-arrow { color: #6e6e80; }

    .empty { text-align: center; color: #6e6e80; padding: 60px 0; }
    .loading { text-align: center; color: #6e6e80; padding: 40px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Reports</h1>
    <p class="sub" id="sub"></p>
    <div id="app"><div class="loading">Loading...</div></div>
  </div>

  <script>
    async function init() {
      const app = document.getElementById('app');
      const sub = document.getElementById('sub');

      try {
        const res = await fetch('./reports.json');
        const groups = await res.json();

        if (!groups.length) {
          app.innerHTML = '<div class="empty">리포트가 없습니다.</div>';
          return;
        }

        const totalReports = groups.reduce((s, g) => s + g.reports.length, 0);
        sub.textContent = `${groups.length}개 PRD \u00b7 ${totalReports}개 리포트`;

        app.innerHTML = groups.map((g, gi) => {
          const reports = g.reports || [];
          const preview = g.prd_preview ? g.prd_preview.replace(/[#\n]/g, ' ').trim() : '';

          const items = reports.map((r, ri) => {
            const m = r.dir.match(/report_(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})/);
            const date = m ? `${m[1]}-${m[2]}-${m[3]} ${m[4]}:${m[5]}:${m[6]}` : '';
            return `
              <a class="item" href="./${r.dir}/">
                <div class="item-num">#${reports.length - ri}</div>
                <div class="item-body">
                  <div class="item-name">${r.dir}</div>
                  <div class="item-meta">${date}</div>
                </div>
                <div class="item-stats">
                  <span>${r.prompts} prompts</span>
                  <span>$${r.cost.toFixed(2)}</span>
                </div>
                <div class="item-arrow">&#x203A;</div>
              </a>
            `;
          }).join('');

          return `
            <div class="prd-group">
              <div class="prd-header">
                <div class="prd-icon">PRD</div>
                <div class="prd-title">${g.title}</div>
                <span class="prd-count">${reports.length}개 리포트</span>
              </div>
              ${preview ? `<div class="prd-preview">${preview.slice(0, 120)}${preview.length > 120 ? '...' : ''}</div>` : ''}
              <div class="list">${items}</div>
            </div>
          `;
        }).join('');

      } catch (e) {
        app.innerHTML = '<div class="empty">리포트 목록을 불러올 수 없습니다.</div>';
      }
    }

    init();
  </script>
</body>
</html>
