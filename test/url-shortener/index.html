<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL 단축 서비스</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
      }
      h1 {
        font-size: 2rem;
        margin-bottom: 2rem;
        color: #38bdf8;
      }
      .container {
        width: 100%;
        max-width: 640px;
      }
      .input-group {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }
      input {
        flex: 1;
        padding: 0.75rem 1rem;
        border: 1px solid #334155;
        border-radius: 8px;
        background: #1e293b;
        color: #e2e8f0;
        font-size: 1rem;
        outline: none;
      }
      input:focus {
        border-color: #38bdf8;
      }
      button {
        padding: 0.75rem 1.5rem;
        background: #38bdf8;
        color: #0f172a;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #7dd3fc;
      }
      .result {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1.5rem;
        display: none;
      }
      .result.show {
        display: block;
      }
      .result a {
        color: #38bdf8;
        word-break: break-all;
      }
      .result .original {
        color: #94a3b8;
        font-size: 0.875rem;
        margin-top: 0.5rem;
        word-break: break-all;
      }
      .copy-btn {
        padding: 0.25rem 0.75rem;
        font-size: 0.8rem;
        margin-left: 0.5rem;
        border-radius: 4px;
      }
      h2 {
        font-size: 1.25rem;
        margin-bottom: 1rem;
        color: #94a3b8;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        text-align: left;
        padding: 0.5rem 0.75rem;
        border-bottom: 1px solid #1e293b;
      }
      th {
        color: #64748b;
        font-size: 0.8rem;
        text-transform: uppercase;
      }
      td a {
        color: #38bdf8;
        text-decoration: none;
      }
      .clicks {
        text-align: center;
        color: #fbbf24;
        font-weight: 600;
      }
      .empty {
        color: #475569;
        text-align: center;
        padding: 2rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>URL 단축 서비스</h1>

      <div class="input-group">
        <input
          type="url"
          id="urlInput"
          placeholder="https://example.com/very/long/url"
        />
        <button onclick="shorten()">단축</button>
      </div>

      <div class="result" id="result">
        <span>단축 URL: </span>
        <a id="shortLink" href="#" target="_blank"></a>
        <button class="copy-btn" onclick="copyUrl()">복사</button>
        <div class="original" id="originalUrl"></div>
      </div>

      <h2>최근 URL 목록</h2>
      <table>
        <thead>
          <tr>
            <th>단축 코드</th>
            <th>원본 URL</th>
            <th>클릭</th>
          </tr>
        </thead>
        <tbody id="urlList">
          <tr>
            <td colspan="3" class="empty">아직 단축된 URL이 없습니다</td>
          </tr>
        </tbody>
      </table>
    </div>

    <script>
      const API = window.location.origin;

      async function shorten() {
        const input = document.getElementById("urlInput");
        const url = input.value.trim();
        if (!url) return;

        const res = await fetch(`${API}/api/shorten`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        });

        const data = await res.json();
        if (!res.ok) {
          alert(data.error);
          return;
        }

        const result = document.getElementById("result");
        const link = document.getElementById("shortLink");
        const orig = document.getElementById("originalUrl");

        link.href = data.shortUrl;
        link.textContent = data.shortUrl;
        orig.textContent = `원본: ${data.url}`;
        result.classList.add("show");
        input.value = "";

        loadList();
      }

      function copyUrl() {
        const link = document.getElementById("shortLink").textContent;
        navigator.clipboard.writeText(link);
        const btn = document.querySelector(".copy-btn");
        btn.textContent = "복사됨!";
        setTimeout(() => (btn.textContent = "복사"), 1500);
      }

      async function loadList() {
        const res = await fetch(`${API}/api/urls`);
        const urls = await res.json();
        const tbody = document.getElementById("urlList");

        if (urls.length === 0) {
          tbody.innerHTML =
            '<tr><td colspan="3" class="empty">아직 단축된 URL이 없습니다</td></tr>';
          return;
        }

        tbody.innerHTML = urls
          .reverse()
          .map(
            (u) => `
          <tr>
            <td><a href="${API}/${u.id}" target="_blank">${u.id}</a></td>
            <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.url}</td>
            <td class="clicks">${u.clicks}</td>
          </tr>
        `,
          )
          .join("");
      }

      document
        .getElementById("urlInput")
        .addEventListener("keydown", (e) => e.key === "Enter" && shorten());
      loadList();
    </script>
  </body>
</html>
