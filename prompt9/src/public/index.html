<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f6fa;
      color: #333;
      min-height: 100vh;
      padding: 40px 16px;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 32px;
      color: #2c3e50;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      padding: 28px;
      margin-bottom: 28px;
    }

    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 20px;
      color: #2c3e50;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: .85rem;
      color: #555;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #dde1e7;
      border-radius: 6px;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }

    input:focus { border-color: #4a90e2; }

    .row {
      display: flex;
      gap: 12px;
    }

    .row .form-group { flex: 1; }

    button {
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 22px;
      font-size: .95rem;
      cursor: pointer;
      transition: background .2s;
    }

    button:hover { background: #357abd; }

    button.secondary {
      background: #eef0f4;
      color: #444;
    }

    button.secondary:hover { background: #dde1e7; }

    #result {
      margin-top: 16px;
      padding: 14px;
      border-radius: 6px;
      font-size: .9rem;
      display: none;
    }

    #result.success {
      background: #eafaf1;
      border: 1px solid #a9dfbf;
      color: #1e8449;
    }

    #result.error {
      background: #fdedec;
      border: 1px solid #f5b7b1;
      color: #922b21;
    }

    #result a {
      color: inherit;
      font-weight: 600;
    }

    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .88rem;
    }

    th, td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid #f0f1f3;
    }

    th {
      color: #888;
      font-weight: 600;
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbfc; }

    .code-link {
      color: #4a90e2;
      text-decoration: none;
      font-family: monospace;
    }

    .code-link:hover { text-decoration: underline; }

    .truncate {
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: inline-block;
      vertical-align: middle;
    }

    .empty {
      text-align: center;
      color: #aaa;
      padding: 32px 0;
      font-size: .9rem;
    }

    .badge {
      display: inline-block;
      background: #eef0f4;
      border-radius: 4px;
      padding: 2px 7px;
      font-size: .78rem;
      color: #666;
    }

    .expired { color: #c0392b; font-size: .8rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>URL Shortener</h1>

    <div class="card">
      <h2>Shorten a URL</h2>
      <div class="form-group">
        <label for="urlInput">Long URL *</label>
        <input type="url" id="urlInput" placeholder="https://example.com/very/long/path" />
      </div>
      <div class="row">
        <div class="form-group">
          <label for="codeInput">Custom code (optional)</label>
          <input type="text" id="codeInput" placeholder="my-link" />
        </div>
        <div class="form-group">
          <label for="ttlInput">Expires in (minutes, optional)</label>
          <input type="number" id="ttlInput" placeholder="e.g. 60" min="1" />
        </div>
      </div>
      <button onclick="shorten()">Shorten</button>
      <div id="result"></div>
    </div>

    <div class="card">
      <div class="table-header">
        <h2>All URLs</h2>
        <button class="secondary" onclick="loadUrls()">Refresh</button>
      </div>
      <div id="tableContainer">
        <p class="empty">Loading...</p>
      </div>
    </div>
  </div>

  <script>
    async function shorten() {
      const url = document.getElementById('urlInput').value.trim();
      const customCode = document.getElementById('codeInput').value.trim();
      const ttlRaw = document.getElementById('ttlInput').value.trim();
      const ttl = ttlRaw ? parseInt(ttlRaw, 10) : undefined;
      const result = document.getElementById('result');

      result.style.display = 'none';

      if (!url) {
        showResult('error', 'Please enter a URL.');
        return;
      }

      try {
        const body = { url };
        if (customCode) body.customCode = customCode;
        if (ttl) body.ttl = ttl;

        const res = await fetch('/api/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();

        if (!res.ok) {
          showResult('error', data.error || 'Something went wrong.');
          return;
        }

        const expires = data.expiresAt
          ? `Expires: ${new Date(data.expiresAt).toLocaleString()}`
          : 'No expiry';

        showResult('success', `Short URL: <a href="${data.shortUrl}" target="_blank">${data.shortUrl}</a> &nbsp;|&nbsp; ${expires}`);
        loadUrls();
      } catch (e) {
        showResult('error', 'Network error.');
      }
    }

    function showResult(type, html) {
      const el = document.getElementById('result');
      el.className = type;
      el.innerHTML = html;
      el.style.display = 'block';
    }

    async function loadUrls() {
      const container = document.getElementById('tableContainer');
      try {
        const res = await fetch('/api/urls');
        const urls = await res.json();

        if (!urls.length) {
          container.innerHTML = '<p class="empty">No URLs yet.</p>';
          return;
        }

        const rows = urls.map(u => {
          const expired = u.expiresAt && new Date(u.expiresAt) < new Date();
          const expiryText = u.expiresAt
            ? (expired
                ? `<span class="expired">Expired ${new Date(u.expiresAt).toLocaleString()}</span>`
                : new Date(u.expiresAt).toLocaleString())
            : '<span class="badge">Never</span>';

          return `<tr>
            <td><span class="truncate" title="${u.original}">${u.original}</span></td>
            <td><a class="code-link" href="/${u.code}" target="_blank">${u.code}</a></td>
            <td>${u.clicks}</td>
            <td>${expiryText}</td>
          </tr>`;
        }).join('');

        container.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Original URL</th>
                <th>Code</th>
                <th>Clicks</th>
                <th>Expires</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;
      } catch {
        container.innerHTML = '<p class="empty">Failed to load URLs.</p>';
      }
    }

    loadUrls();
  </script>
</body>
</html>
