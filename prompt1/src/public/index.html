<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL 단축 서비스</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1 class="header-title">URL 단축 서비스</h1>
      <p class="header-subtitle">긴 URL을 짧고 간편하게</p>
    </div>
  </header>

  <main class="main">

    <!-- 섹션 1: URL 단축 폼 -->
    <section class="card" id="section-shorten">
      <h2 class="section-title">URL 단축하기</h2>
      <form id="shorten-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="original-url">원본 URL <span class="required">*</span></label>
          <input
            class="form-input"
            type="url"
            id="original-url"
            name="url"
            placeholder="https://example.com/very/long/url"
            required
          />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="custom-code">커스텀 코드</label>
            <input
              class="form-input"
              type="text"
              id="custom-code"
              name="customCode"
              placeholder="커스텀 코드 (선택)"
            />
          </div>
          <div class="form-group">
            <label class="form-label" for="expires-in">만료 시간</label>
            <select class="form-select" id="expires-in" name="expiresIn">
              <option value="">없음</option>
              <option value="3600">1시간</option>
              <option value="86400">24시간</option>
              <option value="604800">7일</option>
              <option value="2592000">30일</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary" type="submit" id="shorten-btn">
          <span class="btn-text">단축하기</span>
          <span class="btn-spinner hidden"></span>
        </button>
      </form>

      <!-- 결과 영역 -->
      <div class="result-box hidden" id="result-box">
        <p class="result-label">단축된 URL</p>
        <div class="result-url-row">
          <a class="result-url" id="result-url" href="#" target="_blank" rel="noopener noreferrer"></a>
          <button class="btn btn-copy" id="copy-btn" title="복사">복사</button>
        </div>
      </div>
    </section>

    <!-- 섹션 2: 단축 URL 목록 -->
    <section class="card" id="section-list">
      <div class="section-header">
        <h2 class="section-title">단축 URL 목록</h2>
        <button class="btn btn-secondary" id="refresh-btn">새로고침</button>
      </div>
      <div class="table-wrapper">
        <table class="url-table" id="url-table">
          <thead>
            <tr>
              <th>원본 URL</th>
              <th>단축 URL</th>
              <th>클릭수</th>
              <th>만료일</th>
              <th>삭제</th>
            </tr>
          </thead>
          <tbody id="url-tbody">
            <!-- rows injected by JS -->
          </tbody>
        </table>
        <p class="empty-msg hidden" id="empty-msg">등록된 단축 URL이 없습니다.</p>
        <div class="table-loading hidden" id="table-loading">
          <span class="spinner"></span> 불러오는 중...
        </div>
      </div>
    </section>

    <!-- 섹션 3: 통계 조회 -->
    <section class="card" id="section-stats">
      <h2 class="section-title">통계 조회</h2>
      <div class="stats-form-row">
        <input
          class="form-input"
          type="text"
          id="stats-code"
          placeholder="단축 코드 입력"
        />
        <button class="btn btn-primary" id="stats-btn">
          <span class="btn-text">조회</span>
          <span class="btn-spinner hidden"></span>
        </button>
      </div>

      <div class="stats-cards hidden" id="stats-cards">
        <div class="stat-card">
          <p class="stat-card-label">원본 URL</p>
          <p class="stat-card-value stat-card-url" id="stat-original-url"></p>
        </div>
        <div class="stat-card">
          <p class="stat-card-label">단축 URL</p>
          <p class="stat-card-value" id="stat-short-url"></p>
        </div>
        <div class="stat-card">
          <p class="stat-card-label">클릭수</p>
          <p class="stat-card-value stat-card-highlight" id="stat-clicks"></p>
        </div>
        <div class="stat-card">
          <p class="stat-card-label">생성일</p>
          <p class="stat-card-value" id="stat-created-at"></p>
        </div>
        <div class="stat-card">
          <p class="stat-card-label">만료일</p>
          <p class="stat-card-value" id="stat-expires-at"></p>
        </div>
      </div>
    </section>

  </main>

  <!-- 토스트 알림 컨테이너 -->
  <div class="toast-container" id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
